name: Deploy React App to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: ui

      - name: Build
        run: npm run build
        working-directory: ui

      - name: Deploy to GitHub Pages (force clean)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./ui/dist
          publish_branch: gh-pages
          force_orphan: true   # This deletes the old branch and creates a fresh one
          commit_message: "Deploy React app - ${{ github.sha }}"
